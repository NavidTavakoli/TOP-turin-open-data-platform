name: GTT Static Schedules Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no database writes)'
        type: boolean
        required: true
        default: true

jobs:
  sync:
    name: Sync GTT Schedules
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: city-dashboard

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: city-dashboard/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Execute GTFS Schedule Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Running sync in DRY-RUN mode..."
            node scripts/sync-gtt-stops.cjs --sync-schedules-full --dry-run
          else
            echo "Checking required environment variables for live sync..."
            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
              echo "::error::SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets must be configured in GitHub Secrets for live sync."
              exit 1
            fi
            echo "Running live sync..."
            node scripts/sync-gtt-stops.cjs --sync-schedules-full
          fi
